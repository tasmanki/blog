<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>about</title>
    <meta name="description" content="takibyte blog is a personal blog about creating a cybersecurity and networking home-lab. It features projects and posts, focussed on hands-on learning and experimentation.">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    
    <script>
        const t = localStorage.getItem('theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
    </script>

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="/assets/icons/site.webmanifest">

    <!-- Styles -->
    <link rel='stylesheet' type='text/css' media='screen' href='/css/main.css'>
    <link rel='stylesheet' type='text/css' media='screen' href='/css/template.css'>

    <!-- Scripts -->
    <script src="/js/about.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src='/js/theme.js'></script>
</head>
<body>

    <div class="template">

        <div class="nav-container">

            <div class="title">takibyte blog</div>
            
            <div class="nav">
                <div class="nav-option">
                    <a href="/" class="nav-link">Home</a>
                </div>

                <div class="nav-option">
                    <a href="/projects/" class="nav-link">Projects</a>
                </div>

                <div class="nav-option">
                    <a href="/posts/" class="nav-link">Posts</a>
                </div>
                
                <div class="nav-option">
                    <a href="/about/#this-website" class="nav-link active">About</a>
                </div>

            </div>
        </div>

    </div>

    <div class="about-content">

        <img src="/assets/images/profile.webp" alt="profile" class="profile">
        <br>
        <div class="theme">
            <span>Theme:</span>
            <select id="theme-select">
                <option value="nord">Nord</option>
                <option value="tokyonight">Tokyo Night</option>
                <option value="mocha">Mocha</option>
            </select>  
        </div>

        <div id="md-container"></div>

    </div>
     

</body>
</html>
